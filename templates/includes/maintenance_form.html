<div id="maintenance-form" class="form-section{% if force_active or active_tab == 'maintenance-form' %} active{% endif %}">
  <form method="post" class="form" id="maintenance"{% if action_url %} action="{{ action_url }}"{% endif %}>
    {% csrf_token %}
    <input type="hidden" name="form_type" value="maintenance" />

    {% if maintenance_form.non_field_errors %}
      <div class="message error">{{ maintenance_form.non_field_errors|striptags }}</div>
    {% endif %}

    <div class="form-grid">
      {% for field in maintenance_form %}
        <div class="field">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <div class="field-error">{{ field.errors|striptags }}</div>
          {% endif %}
        </div>
      {% endfor %}
    </div>
    <button type="submit" class="btn-primary">{{ button_label|default:"Save Maintenance" }}</button>
  </form>
</div>
