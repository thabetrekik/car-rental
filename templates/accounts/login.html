{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Auto Voyage</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/login_style.css' %}">

    
    <link rel="icon" href="{% static 'img/favicon.ico' %}">
</head>
<body>
    <div class="login-wrapper login-wrapper--scenic">
        <div class="floating-icons">
            <i class="fa-solid fa-map-location-dot float-icon icon-1"></i>
            <i class="fa-solid fa-key float-icon icon-2"></i>
            <i class="fa-solid fa-location-dot float-icon icon-3"></i>
            <i class="fa-solid fa-car float-icon icon-4"></i>
            <i class="fa-solid fa-compass float-icon icon-5"></i>
        </div>

        <div class="glass-card">
            <div class="logo-section">
                <i class="fa-solid fa-car-side car-icon"></i>
                <h1>AUTO VOYAGE</h1>
            </div>

            {% if messages %}
                <div class="django-messages">
                    {% for message in messages %}
                        <p class="{{ message.tags }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="post" class="login-form">
                {% csrf_token %}

                <div class="input-group">
                    <input type="text" name="username" placeholder="Username" required class="glass-input">
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required class="glass-input" id="password-field">
                    <span class="toggle-password" data-password-toggle>
                        <i class="fa-regular fa-eye-slash" id="toggle-icon"></i>
                    </span>
                </div>

                <button type="submit" class="glow-button">LOGIN</button>

                <p class="register-note">
                    Don't have an account?
                    <a href="{% url 'register' %}">Register</a>
                </p>
            </form>
        </div>
    </div>

    <script src="{% static 'js/login.js' %}"></script>
</body>
</html>
