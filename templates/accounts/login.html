{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Auto Voyage</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Glassmorphism login styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .login-wrapper {
            min-height: 100vh;
            width: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .login-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .floating-icons {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .float-icon {
            position: absolute;
            color: transparent;
            -webkit-text-stroke: 2px rgba(109, 213, 237, 0.8);
            filter: drop-shadow(0 0 8px rgba(109, 213, 237, 0.6));
            animation: float 6s ease-in-out infinite;
        }

        .icon-1 { top: 20%; left: 15%; font-size: 4rem; animation-delay: 0s; }
        .icon-2 { top: 65%; left: 20%; font-size: 3rem; animation-delay: 2s; }
        .icon-3 { top: 25%; right: 15%; font-size: 3.5rem; animation-delay: 1s; }
        .icon-4 { top: 70%; right: 18%; font-size: 4.5rem; animation-delay: 3s; }
        .icon-5 { top: 10%; left: 50%; font-size: 2.5rem; animation-delay: 4s; }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .glass-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            padding: 50px 45px;
            width: 420px;
            color: white;
            text-align: center;
        }

        .logo-section {
            margin-bottom: 40px;
        }

        .logo-section .car-icon {
            font-size: 2.8rem;
            color: #ffffff;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(109, 213, 237, 0.8);
        }

        .logo-section h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 3px;
            line-height: 1.2;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
        }

        .django-messages p {
            background: rgba(220, 53, 69, 0.7);
            backdrop-filter: blur(5px);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border: 1px solid rgba(220, 53, 69, 0.5);
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .glass-input {
            width: 100%;
            padding: 16px 45px 16px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .glass-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(109, 213, 237, 0.8);
            box-shadow: 0 0 15px rgba(109, 213, 237, 0.3);
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 18px;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.3s ease;
        }

        .toggle-password:hover {
            color: white;
        }

        .glow-button {
            width: 80%;
            margin-top: 15px;
            padding: 15px;
            border: 1px solid rgba(109, 213, 237, 0.6);
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(109, 213, 237, 0.3) 0%, rgba(33, 147, 176, 0.1) 100%);
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(109, 213, 237, 0.2), 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .glow-button:hover {
            background: linear-gradient(135deg, rgba(109, 213, 237, 0.5) 0%, rgba(33, 147, 176, 0.3) 100%);
            border-color: rgba(109, 213, 237, 1);
            transform: translateY(-3px);
            box-shadow: inset 0 0 20px rgba(109, 213, 237, 0.5), 0 8px 25px rgba(109, 213, 237, 0.4);
        }

        .glow-button:active {
            transform: translateY(1px);
        }

        .register-note {
            margin-top: 18px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .register-note a {
            color: #9fe8ff;
            text-decoration: none;
            font-weight: 600;
        }

        .register-note a:hover {
            text-decoration: underline;
        }

        @media screen and (max-width: 768px) {
            .glass-card {
                width: 90%;
                max-width: 400px;
                padding: 40px 25px;
            }

            .glow-button {
                width: 100%;
            }

            .float-icon {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper" style="background-image: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=2066&auto=format&fit=crop');">
        <div class="floating-icons">
            <i class="fa-solid fa-map-location-dot float-icon icon-1"></i>
            <i class="fa-solid fa-key float-icon icon-2"></i>
            <i class="fa-solid fa-location-dot float-icon icon-3"></i>
            <i class="fa-solid fa-car float-icon icon-4"></i>
            <i class="fa-solid fa-compass float-icon icon-5"></i>
        </div>

        <div class="glass-card">
            <div class="logo-section">
                <i class="fa-solid fa-car-side car-icon"></i>
                <h1>AUTO VOYAGE</h1>
            </div>

            {% if messages %}
                <div class="django-messages">
                    {% for message in messages %}
                        <p class="{{ message.tags }}">{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="post" class="login-form">
                {% csrf_token %}

                <div class="input-group">
                    <input type="text" name="username" placeholder="Username" required class="glass-input">
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required class="glass-input" id="password-field">
                    <span class="toggle-password" onclick="togglePasswordVisibility()">
                        <i class="fa-regular fa-eye-slash" id="toggle-icon"></i>
                    </span>
                </div>

                <button type="submit" class="glow-button">LOGIN</button>

                <p class="register-note">
                    Don't have an account?
                    <a href="{% url 'register' %}">Register</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        function togglePasswordVisibility() {
            const passwordField = document.getElementById("password-field");
            const toggleIcon = document.getElementById("toggle-icon");
            if (passwordField.type === "password") {
                passwordField.type = "text";
                toggleIcon.classList.remove("fa-eye-slash");
                toggleIcon.classList.add("fa-eye");
            } else {
                passwordField.type = "password";
                toggleIcon.classList.remove("fa-eye");
                toggleIcon.classList.add("fa-eye-slash");
            }
        }
    </script>
</body>
</html>
