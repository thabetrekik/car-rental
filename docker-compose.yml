services:

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    expose:
      - "8000"
    environment:
      MYSQL_DATABASE: car_rental
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - car_rental_default

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: car_rental
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - car_rental_default
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uadmin", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 12

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    depends_on:
      - web
    networks:
      - car_rental_default

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins

    container_name: jenkins

    user: root

    ports:
      - "8080:8080"
      - "50000:50000"

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - car_rental_default

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    networks:
      - car_rental_default

volumes:
  mysql_data:
  jenkins_home:

networks:
  car_rental_default:
    driver: bridge