services:

  web:
    build: .
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
             
    volumes:
      - ${WORKSPACE:-.}:/app

    ports:
      - "8001:8000"
    environment:
      MYSQL_DATABASE: car_rental
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_HOST: db
      MYSQL_PORT: "3306"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    networks:
      - car_rental_network

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_DATABASE: car_rental
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    ports:
      - "3308:3306"   # ✅ changed from 3307 to 3308
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - car_rental_network

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
    networks:
      - car_rental_network

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - car_rental_network

  sonarqube:
    image: sonarqube:lts-community
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    networks:
      - car_rental_network

volumes:
  mysql_data:
  jenkins_home:

networks:
  car_rental_network:
    driver: bridge
