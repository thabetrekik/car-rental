    - name: Run Django server
      run: |
        python manage.py runserver 0.0.0.0:8000 &
        sleep 10

    - name: OWASP ZAP Scan
      run: |
        docker run --rm \
          -v $(pwd):/zap/wrk:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py -t http://127.0.0.1:8000 -r zap_report.html